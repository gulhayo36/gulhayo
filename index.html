<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulhayo | Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <style>
        :root { --pink: #ff1493; --glow: #ff69b4; --dark: #0a0118; --blue: #00bfff; --purple: #8a2be2; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: var(--dark); color: white; min-height: 100vh; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 20%, rgba(255, 20, 147, 0.25), transparent 70%);
        }

        /* Navigatsiya - Menyular ishlashi uchun muhim */
        nav { display: flex; justify-content: center; margin: 20px 0; position: sticky; top: 10px; z-index: 1000; }
        .nav-container { 
            background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(20px);
            padding: 10px 30px; border-radius: 50px; border: 1px solid rgba(255, 20, 147, 0.3);
            display: flex; gap: 20px; box-shadow: 0 0 20px rgba(255, 20, 147, 0.1);
        }
        .nav-container a { color: white; text-decoration: none; font-size: 13px; cursor: pointer; transition: 0.3s; opacity: 0.8; }
        .nav-container a:hover { color: var(--glow); text-shadow: 0 0 10px var(--pink); opacity: 1; }

        /* Sahifalar */
        .page { display: none; padding: 20px; animation: fadeIn 0.6s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Bosh Sahifa */
        .hero { text-align: center; margin-top: 20px; }
        .name { font-family: 'Dancing Script', cursive; font-size: 70px; color: var(--glow); text-shadow: 0 0 20px var(--pink); margin: 10px 0; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; max-width: 900px; margin: 50px auto; }
        .card { 
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 20, 147, 0.2);
            border-radius: 20px; padding: 25px; text-align: center; cursor: pointer; transition: 0.4s;
            backdrop-filter: blur(10px);
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 0 25px rgba(255, 20, 147, 0.5); border-color: var(--pink); }

        /* Kamera Bo'limi */
        .camera-box { max-width: 500px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 30px; border: 1px solid var(--blue); }
        #webcam-container { margin: 20px auto; border: 4px solid var(--blue); border-radius: 20px; overflow: hidden; width: 200px; height: 200px; background: #000; }
        .btn-neon { background: linear-gradient(45deg, var(--blue), var(--purple)); color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; margin: 5px; transition: 0.3s; }
        .btn-stop { background: #333; box-shadow: 0 0 10px #000; }

        .earth-glow { position: fixed; bottom: -120px; left: 50%; transform: translateX(-50%); width: 140%; height: 300px; background: radial-gradient(circle, rgba(0, 162, 255, 0.25), transparent 70%); z-index: -1; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a onclick="showPage('home')">Bosh Sahifa</a>
            <a onclick="showPage('maqolalar')">Maqolalar</a>
            <a onclick="showPage('kamera')">AI Kamera</a>
        </div>
    </nav>
    <div id="home" class="page active">
        <div class="hero">
            <h1 class="name">Gulhayo Abdug'aniyeva</h1>
            <p style="text-align: center; opacity: 0.8; letter-spacing: 2px;">AI RESEARCHER PORTFOLIO</p>
        </div>
        <div class="grid">
            <div class="card" onclick="showPage('maqolalar')"><h3>📄 Maqolalar</h3><p>Mening ilmiy ishlarim</p></div>
            <div class="card" onclick="showPage('kamera')"><h3>🧠 AI Kamera</h3><p>Modelni sinash</p></div>
        </div>
    </div>

    <div id="maqolalar" class="page">
        <h2 class="name" style="font-size: 50px; text-align: center;">Maqolalarim</h2>
        <div class="grid" style="grid-template-columns: 1fr; max-width: 700px;">
            <div class="card" style="text-align: left;">
                <h3>Sun'iy intellekt va ma'lumotlar bazasi</h3>
                <p style="margin: 10px 0; opacity: 0.7;">Jamiyat hayotidagi SI roli.</p>
                <a href="313-320.pdf" target="_blank"><button class="btn-neon">PDF O'qish</button></a>
            </div>
            <div class="card" style="text-align: left;">
                <h3>ResOAK-2025 Maqola</h3>
                <p style="margin: 10px 0; opacity: 0.7;">Anjuman ilmiy ishi.</p>
                <a href="Maqola ResOAK-2025 ajratilgani.pdf" target="_blank"><button class="btn-neon">PDF O'qish</button></a>
            </div>
        </div>
    </div>

    <div id="kamera" class="page">
        <h2 class="name" style="font-size: 50px; text-align: center;">AI Kamera</h2>
        <div class="camera-box" style="text-align: center;">
            <button class="btn-neon" onclick="init()">Yoqish</button>
            <button class="btn-neon btn-stop" onclick="stopWebcam()">O'chirish</button>
            <div id="webcam-container"></div>
            <div id="label-container" style="color: var(--blue); font-weight: bold;"></div>
        </div>
    </div>

    <div class="earth-glow"></div>

    <script>
        // MENYUNI BOSHQARISH FUNKSIYASI
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if (pageId !== 'kamera') stopWebcam(); // Kamera sahifasidan chiqsa o'chadi
        }

        // AI KAMERA KODI
        const URL = "https://teachablemachine.withgoogle.com/models/v_XPF4oYq/"; 
        let model, webcam, labelContainer, maxPredictions, animationId;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(200, 200, true); 
            await webcam.setup(); 
            await webcam.play();
            animationId = window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").innerHTML = ""; 
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
        }

        async function loop() {
            webcam.update();
            await predict();
            animationId = window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                const div = document.createElement("div");
                div.innerHTML = prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
                labelContainer.appendChild(div);
            }
        }

        async function stopWebcam() {
            if (webcam) {
                await webcam.stop();
                window.cancelAnimationFrame(animationId);
                document.getElementById("webcam-container").innerHTML = "";
                labelContainer.innerHTML = "Kamera o'chirildi.";
                webcam = null;
            }
        }
    </script>
</body>
</html>
