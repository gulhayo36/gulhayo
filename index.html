<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulhayo | AI Researcher</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <style>
        :root { --pink: #ff1493; --glow: #ff69b4; --dark: #0a0118; --blue: #00bfff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: var(--dark); color: white; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 20%, rgba(255, 20, 147, 0.2), transparent 70%);
        }

        /* Navigatsiya */
        nav { display: flex; justify-content: center; margin: 20px 0; position: sticky; top: 10px; z-index: 1000; }
        .nav-container { 
            background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(15px);
            padding: 10px 25px; border-radius: 50px; border: 1px solid rgba(255, 20, 147, 0.3);
            display: flex; gap: 20px;
        }
        .nav-container a { color: white; text-decoration: none; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .nav-container a:hover { color: var(--glow); text-shadow: 0 0 10px var(--pink); }

        /* Sahifalar */
        .page { display: none; padding: 20px; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Bosh Sahifa va Profil Rasmi */
        .hero { text-align: center; margin-top: 30px; }
        .profile-img { 
            width: 180px; height: 180px; border-radius: 50%; 
            border: 3px solid var(--pink); box-shadow: 0 0 20px var(--pink);
            object-fit: cover; margin-bottom: 20px;
        }
        .name { font-family: 'Dancing Script', cursive; font-size: 60px; color: var(--glow); text-shadow: 0 0 20px var(--pink); }

        /* Kartalar */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 900px; margin: 40px auto; }
        .card { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 20, 147, 0.2);
            border-radius: 20px; padding: 25px; text-align: center; transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--pink); box-shadow: 0 0 20px rgba(255, 20, 147, 0.3); }

        /* Kamera */
        .camera-box { max-width: 500px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 25px; border: 1px solid var(--blue); }
        #webcam-container { margin: 20px auto; border: 3px solid var(--blue); border-radius: 15px; overflow: hidden; width: 200px; height: 200px; background: #000; margin-left: auto; margin-right: auto; }
        .btn-neon { background: linear-gradient(45deg, var(--blue), #8a2be2); color: white; border: none; padding: 12px 20px; border-radius: 20px; cursor: pointer; margin: 5px; }
        .btn-stop { background: #444; }

        /* Aloqa */
        .contact-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--blue); color: white; text-decoration: none; transition: 0.3s; }
        .contact-btn:hover { background: var(--blue); color: black; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a onclick="showPage('home')">Bosh Sahifa</a>
            <a onclick="showPage('maqolalar')">Maqolalar</a>
            <a onclick="showPage('kamera')">AI Kamera</a>
            <a onclick="showPage('aloqa')">Aloqa</a>
        </div>
    </nav>
    <div id="home" class="page active">
        <div class="hero">
            <img src="profil.jpg" alt="Gulhayo" class="profile-img">
            <h1 class="name">Gulhayo Abdug'aniyeva</h1>
            <p style="letter-spacing: 2px; opacity: 0.8; margin-top: 10px;">AI RESEARCHER PORTFOLIO</p>
        </div>
        <div class="grid">
            <div class="card" onclick="showPage('maqolalar')"><h3>📄 Maqolalar</h3><p>Ilmiy ishlarim</p></div>
            <div class="card" onclick="showPage('kamera')"><h3>🧠 AI Kamera</h3><p>Modelni sinash</p></div>
        </div>
    </div>

    <div id="maqolalar" class="page">
        <h2 class="name" style="font-size: 45px; text-align: center;">Maqolalarim</h2>
        <div class="grid" style="grid-template-columns: 1fr; max-width: 600px;">
            <div class="card" style="text-align: left;">
                <h3>Sun'iy intellekt va jamiyat</h3>
                <p style="font-size: 14px; margin: 10px 0;">ISSN: 3060-4567 maqolasi</p>
                <a href="313-320.pdf" target="_blank"><button class="btn-neon">O'qish</button></a>
            </div>
        </div>
    </div>

    <div id="kamera" class="page">
        <h2 class="name" style="font-size: 45px; text-align: center;">AI Kamera</h2>
        <div class="camera-box" style="text-align: center;">
            <button class="btn-neon" onclick="init()">Yoqish</button>
            <button class="btn-neon btn-stop" onclick="stopWebcam()">O'chirish</button>
            <div id="webcam-container"></div>
            <div id="label-container" style="color: var(--blue); font-weight: bold;"></div>
        </div>
    </div>

    <div id="aloqa" class="page">
        <h2 class="name" style="font-size: 45px; text-align: center;">Aloqa</h2>
        <div class="grid" style="grid-template-columns: 1fr; max-width: 400px;">
            <div class="card">
                <a href="https://t.me/gulhayo36" class="contact-btn">Telegram: @gulhayo36</a>
                <a href="mailto:gulhayoabduganiyeva36@gmail.com" class="contact-btn">Email yuborish</a>
            </div>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if (pageId !== 'kamera') stopWebcam();
        }

        const URL = "https://teachablemachine.withgoogle.com/models/v_XPF4oYq/"; 
        let model, webcam, labelContainer, maxPredictions, animationId;

        async function init() {
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();
            webcam = new tmImage.Webcam(200, 200, true); 
            await webcam.setup(); await webcam.play();
            animationId = window.requestAnimationFrame(loop);
            document.getElementById("webcam-container").innerHTML = ""; 
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
        }

        async function loop() { webcam.update(); await predict(); animationId = window.requestAnimationFrame(loop); }
        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            labelContainer.innerHTML = prediction[0].className + ": " + (prediction[0].probability * 100).toFixed(0) + "%";
        }

        function stopWebcam() {
            if (webcam) {
                webcam.stop();
                window.cancelAnimationFrame(animationId);
                document.getElementById("webcam-container").innerHTML = "";
                labelContainer.innerHTML = "Kamera o'chirildi";
                webcam = null;
            }
        }
    </script>
</body>
</html>
